<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="40%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <!-- Gold highlight -->
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A0" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#D4A017" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#8B6508" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Matte black gradient -->
    <linearGradient id="blackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3A3C"/>
      <stop offset="50%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </linearGradient>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.06"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="40" y="40" width="944" height="944" rx="200" ry="200"
        fill="url(#bgGrad)" stroke="#3A3A3C" stroke-width="3"/>

  <!-- Subtle inner border -->
  <rect x="52" y="52" width="920" height="920" rx="188" ry="188"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="2"/>

  <!-- === CLIPBOARD B (Gold, back) === -->

  <!-- Gold clipboard body -->
  <g filter="url(#shadow)">
    <path d="M 560 280 L 840 280 Q 880 280 880 320 L 880 740 Q 880 780 840 780 L 560 780 Q 520 780 520 740 L 520 320 Q 520 280 560 280 Z"
          fill="url(#goldGrad)" stroke="#8B6508" stroke-width="2"/>

    <!-- Clipboard clip at top -->
    <rect x="640" y="240" width="160" height="60" rx="14" ry="14"
          fill="url(#goldGrad)" stroke="#8B6508" stroke-width="2"/>

    <!-- Gold highlight overlay -->
    <path d="M 560 280 L 840 280 Q 880 280 880 320 L 880 740 Q 880 780 840 780 L 560 780 Q 520 780 520 740 L 520 320 Q 520 280 560 280 Z"
          fill="url(#goldHighlight)"/>

    <!-- Paper lines -->
    <line x1="560" y1="370" x2="800" y2="370" stroke="#8B6508" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="560" y1="430" x2="780" y2="430" stroke="#8B6508" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="560" y1="490" x2="820" y2="490" stroke="#8B6508" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="560" y1="550" x2="750" y2="550" stroke="#8B6508" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- === CLIPBOARD A (Charcoal, front, offset) === -->

  <!-- Black clipboard body -->
  <g filter="url(#shadow)">
    <path d="M 160 350 L 440 350 Q 480 350 480 390 L 480 810 Q 480 850 440 850 L 160 850 Q 120 850 120 810 L 120 390 Q 120 350 160 350 Z"
          fill="url(#blackGrad)" stroke="#555557" stroke-width="2"/>

    <!-- Clipboard clip at top -->
    <rect x="210" y="310" width="180" height="60" rx="14" ry="14"
          fill="url(#blackGrad)" stroke="#555557" stroke-width="2"/>

    <!-- Paper lines -->
    <line x1="160" y1="440" x2="400" y2="440" stroke="#555557" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="500" x2="380" y2="500" stroke="#555557" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="560" x2="420" y2="560" stroke="#555557" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="620" x2="350" y2="620" stroke="#555557" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="680" x2="400" y2="680" stroke="#555557" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>

    <!-- Gold accent bar on left edge of clipboard A -->
    <rect x="120" y="390" width="6" height="420" rx="3" ry="3"
          fill="#D4A017" opacity="0.8"/>
  </g>

  <!-- === "B" and "A" labels === -->

  <!-- B label -->
  <text x="700" y="720"
        font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
        font-size="140" font-weight="700"
        fill="#1C1C1E" fill-opacity="0.35"
        text-anchor="middle">B</text>

  <!-- A label -->
  <text x="300" y="790"
        font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
        font-size="140" font-weight="700"
        fill="#FFFFFF" fill-opacity="0.15"
        text-anchor="middle">A</text>

  <!-- === Corner accent dot === -->
  <circle cx="880" cy="780" r="12" fill="#D4A017" opacity="0.6"/>
</svg>
