name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release-macos:
    name: Create macOS Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build Release (arm64)
        run: |
          swift build \
            --configuration release \
            --arch arm64 \
            --product JacqueCopy

      - name: Build Release (x86_64)
        run: |
          swift build \
            --configuration release \
            --arch x86_64 \
            --product JacqueCopy

      - name: Create Universal Binary
        run: |
          mkdir -p build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/JacqueCopy \
            .build/x86_64-apple-macosx/release/JacqueCopy \
            -output build/universal/JacqueCopy

      - name: Create App Bundle
        run: |
          mkdir -p "build/JacqueCopy.app/Contents/MacOS"
          mkdir -p "build/JacqueCopy.app/Contents/Resources"
          cp build/universal/JacqueCopy "build/JacqueCopy.app/Contents/MacOS/"
          cp Sources/JacqueCopy/Resources/Info.plist "build/JacqueCopy.app/Contents/"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "JacqueCopy.app" 150 190 \
            --hide-extension "JacqueCopy.app" \
            --app-drop-link 450 185 \
            --volname "Jacque-Copy" \
            "build/JacqueCopy-${{ steps.version.outputs.version }}.dmg" \
            "build/JacqueCopy.app"

      - name: Create ZIP (macOS)
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent \
            "JacqueCopy.app" \
            "JacqueCopy-${{ steps.version.outputs.version }}.zip"
          cd ..

      - name: Generate Checksums
        run: |
          cd build
          shasum -a 256 \
            "JacqueCopy-${{ steps.version.outputs.version }}.dmg" \
            "JacqueCopy-${{ steps.version.outputs.version }}.zip" \
            > SHA256SUMS.txt
          cd ..

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: |
            build/JacqueCopy-${{ steps.version.outputs.version }}.dmg
            build/JacqueCopy-${{ steps.version.outputs.version }}.zip
            build/SHA256SUMS.txt

  release-windows:
    name: Create Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Set Version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION for Windows"

      - name: Build Release
        shell: bash
        run: |
          swift build \
            --configuration release \
            --product JacqueCopy

      - name: Create Windows ZIP
        shell: bash
        run: |
          mkdir -p build/windows
          # Copy the built executable
          if [ -f ".build/release/JacqueCopy.exe" ]; then
            cp .build/release/JacqueCopy.exe build/windows/
          elif [ -f ".build/x86_64-unknown-windows-msvc/release/JacqueCopy.exe" ]; then
            cp .build/x86_64-unknown-windows-msvc/release/JacqueCopy.exe build/windows/
          fi
          # Create ZIP
          cd build/windows
          7z a "../JacqueCopy-${{ steps.version.outputs.version }}-windows.zip" *
          cd ../..
          # Generate checksum
          sha256sum "build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip" \
            > "build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip.sha256"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip
            build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip.sha256

  create-release:
    name: Create GitHub Release
    needs: [release-macos, release-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set Version
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release-assets
          path: build/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: build/

      - name: Combine Checksums
        run: |
          # Combine all checksums
          cat build/SHA256SUMS.txt > build/SHA256SUMS-combined.txt
          if [ -f "build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip.sha256" ]; then
            cat "build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip.sha256" >> build/SHA256SUMS-combined.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Jacque-Copy v${{ steps.version.outputs.version }}"
          body_path: Documentation/RELEASE_NOTES.md
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            build/JacqueCopy-${{ steps.version.outputs.version }}.dmg
            build/JacqueCopy-${{ steps.version.outputs.version }}.zip
            build/JacqueCopy-${{ steps.version.outputs.version }}-windows.zip
            build/SHA256SUMS-combined.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
