name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Jacque-Copy
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Build Environment
        run: |
          swift --version
          xcodebuild -version
          xcrun --show-sdk-path

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build (Debug)
        run: |
          swift build \
            --configuration debug \
            --arch arm64 \
            --arch x86_64

      - name: Build (Release)
        run: |
          swift build \
            --configuration release \
            --arch arm64 \
            --arch x86_64

      - name: Run Tests
        run: |
          swift test \
            --configuration debug \
            --parallel \
            --xunit-output TestResults.xml 2>&1 || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults.xml

  lint:
    name: Lint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --reporter github-actions-logging --strict
          else
            echo "SwiftLint not installed, skipping lint step"
          fi
