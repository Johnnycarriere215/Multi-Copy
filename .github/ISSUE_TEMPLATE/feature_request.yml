name: Feature Request
description: Suggest an idea for Jacque-Copy
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please check the [Roadmap](../blob/main/Documentation/ROADMAP.md) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      placeholder: "I often need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see?
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative solutions?

  - type: dropdown
    id: scope
    attributes:
      label: Feature Scope
      options:
        - Menu Bar
        - Settings
        - Clipboard Engine
        - Hotkeys
        - History
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I've checked the roadmap and this isn't already planned
        - label: I've searched existing issues for similar requests
