<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B3564"/>
      <stop offset="1" stop-color="#1E1B33"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFDE7A"/>
      <stop offset="1" stop-color="#E0A317"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDEFF5"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#bg)"/>
  <rect x="4" y="4" width="248" height="248" rx="54" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Back card: Clipboard B (gold) -->
  <g>
    <rect x="108" y="52" width="98" height="128" rx="20" fill="url(#gold)"/>
    <rect x="137" y="43" width="40" height="20" rx="9" fill="#C98A0E"/>
    <text x="157" y="132" font-family="DejaVu Sans, Arial, sans-serif" font-size="58" font-weight="800" fill="#7A5407" fill-opacity="0.45" text-anchor="middle">B</text>
  </g>

  <!-- Front card: Clipboard A (paper white) -->
  <g>
    <rect x="50" y="84" width="98" height="128" rx="20" fill="url(#paper)"/>
    <rect x="79" y="75" width="40" height="20" rx="9" fill="#C1C6D4"/>
    <!-- content lines -->
    <rect x="68" y="120" width="62" height="8" rx="4" fill="#C7CCDA"/>
    <rect x="68" y="140" width="62" height="8" rx="4" fill="#C7CCDA"/>
    <rect x="68" y="160" width="44" height="8" rx="4" fill="#C7CCDA"/>
    <!-- gold accent edge -->
    <rect x="50" y="112" width="6" height="72" rx="3" fill="#E0A317"/>
    <text x="99" y="204" font-family="DejaVu Sans, Arial, sans-serif" font-size="30" font-weight="800" fill="#3B3564" fill-opacity="0.28" text-anchor="middle">A</text>
  </g>
</svg>
